name: CI quality gates

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Run quality gates
        run: bash scripts/run-ci-quality-gates.sh
